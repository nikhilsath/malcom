<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malcom</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body class="app-shell" data-section="docs" data-sidenav-item="sidenav-docs-create" data-shell-path-prefix="../">
    <div id="topnav"></div>

    <aside id="sidenav"></aside>

    <main class="main" id="docs-create-main">
        <div class="content-shell">
            <div class="page-header section-header--page" id="docs-create-header">
                <div class="title-row">
                    <h2 class="page-title section-header__title--page" id="page-title"></h2>
                    <button type="button" id="page-info-badge" class="info-badge" aria-label="Page information" aria-expanded="false" aria-controls="page-description">i</button>
                </div>
                <p class="page-description section-header__description--page" id="page-description" hidden></p>
            </div>

            <section id="docs-create-section" class="card">
                <div id="docs-create-section-header" class="section-header">
                    <div id="docs-create-section-copy" class="section-header__copy">
                        <p id="docs-create-eyebrow" class="section-header__eyebrow">Documentation</p>
                        <div class="title-row">
                            <h3 id="docs-create-title" class="section-header__title">Create documentation entry</h3>
                            <button type="button" id="docs-create-description-badge" class="info-badge" aria-label="More information" aria-expanded="false" aria-controls="docs-create-description">i</button>
                        </div>
                        <p id="docs-create-description" class="section-header__description" hidden>Add a new documentation entry with a title, category, and content body.</p>
                    </div>
                </div>

                <form id="docs-create-form" class="api-form">
                    <div id="docs-create-form-grid" class="api-form-grid">
                        <label id="docs-create-title-field" class="api-form-field api-form-field--full">
                            <span id="docs-create-title-label" class="api-form-label">Title</span>
                            <input id="docs-create-title-input" class="api-form-input" type="text" name="title" maxlength="200" required placeholder="Documentation title">
                        </label>

                        <label id="docs-create-category-field" class="api-form-field">
                            <span id="docs-create-category-label" class="api-form-label">Category</span>
                            <input id="docs-create-category-input" class="api-form-input" type="text" name="category" maxlength="100" placeholder="e.g. Getting Started">
                        </label>

                        <label id="docs-create-tags-field" class="api-form-field">
                            <span id="docs-create-tags-label" class="api-form-label">Tags</span>
                            <input id="docs-create-tags-input" class="api-form-input" type="text" name="tags" maxlength="200" placeholder="Comma-separated tags">
                        </label>

                        <label id="docs-create-content-field" class="api-form-field api-form-field--full">
                            <span id="docs-create-content-label" class="api-form-label">Content</span>
                            <textarea id="docs-create-content-input" class="api-form-textarea" name="content" rows="10" required placeholder="Write documentation content here…"></textarea>
                        </label>
                    </div>

                    <div id="docs-create-form-feedback" class="api-form-feedback" aria-live="polite"></div>

                    <div id="docs-create-form-actions" class="api-form-actions">
                        <button type="submit" id="docs-create-submit" class="button button--primary primary-action-button">Save entry</button>
                        <button type="reset" id="docs-create-reset" class="button button--secondary secondary-action-button">Clear form</button>
                    </div>
                </form>
            </section>
        </div>
    </main>

    <script type="module" src="../scripts/utils.js"></script>
    <script type="module" src="../scripts/log-store.js"></script>
    <script type="module" src="../scripts/navigation.js"></script>
    <script type="module" src="../scripts/docs/create.js"></script>
</body>
</html>
