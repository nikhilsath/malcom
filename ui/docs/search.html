<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malcom</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body class="app-shell" data-section="docs" data-sidenav-item="sidenav-docs-search" data-shell-path-prefix="../">
    <div id="topnav"></div>

    <aside id="sidenav"></aside>

    <main class="main" id="docs-search-main">
        <div class="content-shell">
            <div class="page-header section-header--page" id="docs-search-header">
                <div class="title-row">
                    <h2 class="page-title section-header__title--page" id="page-title"></h2>
                    <button type="button" id="page-info-badge" class="info-badge" aria-label="Page information" aria-expanded="false" aria-controls="page-description">i</button>
                </div>
                <p class="page-description section-header__description--page" id="page-description" hidden></p>
            </div>

            <section id="docs-search-section" class="card">
                <div id="docs-search-section-header" class="section-header">
                    <div id="docs-search-section-copy" class="section-header__copy">
                        <p id="docs-search-eyebrow" class="section-header__eyebrow">Documentation</p>
                        <div class="title-row">
                            <h3 id="docs-search-title" class="section-header__title">Search documentation</h3>
                            <button type="button" id="docs-search-description-badge" class="info-badge" aria-label="More information" aria-expanded="false" aria-controls="docs-search-description">i</button>
                        </div>
                        <p id="docs-search-description" class="section-header__description" hidden>Enter keywords to find documentation entries by title, content, or tag.</p>
                    </div>
                </div>

                <form id="docs-search-form" class="api-form">
                    <div id="docs-search-form-grid" class="api-form-grid">
                        <label id="docs-search-query-field" class="api-form-field api-form-field--full">
                            <span id="docs-search-query-label" class="api-form-label">Search query</span>
                            <input id="docs-search-query-input" class="api-form-input" type="search" name="query" placeholder="Enter keywords…" autocomplete="off">
                        </label>
                    </div>
                    <div id="docs-search-form-actions" class="api-form-actions">
                        <button type="submit" id="docs-search-submit" class="button button--primary primary-action-button">Search</button>
                    </div>
                </form>

                <div id="docs-search-results" class="docs-results" aria-live="polite"></div>
            </section>
        </div>
    </main>

    <script type="module" src="../scripts/utils.js"></script>
    <script type="module" src="../scripts/log-store.js"></script>
    <script type="module" src="../scripts/navigation.js"></script>
    <script type="module" src="../scripts/docs/search.js"></script>
</body>
</html>
