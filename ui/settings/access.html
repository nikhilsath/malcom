<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malcom</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body class="app-shell" data-section="settings" data-settings-section="access" data-sidenav-item="sidenav-settings-access" data-shell-path-prefix="../">
    <div id="topnav"></div>

    <aside id="sidenav"></aside>

    <main class="main" id="settings-main-layout">
        <div class="content-shell">
            <div class="page-header section-header--page" id="settings-header">
                <div class="title-row">
                    <h2 class="page-title section-header__title--page" id="page-title"></h2>
                    <button type="button" id="page-info-badge" class="info-badge" aria-label="Page information" aria-expanded="false" aria-controls="page-description">i</button>
                </div>
                <p class="page-description section-header__description--page" id="page-description" hidden></p>
            </div>

            <section id="settings-access-section" class="card settings-section">
                <div id="settings-access-header" class="settings-section__header">
                    <p id="settings-access-eyebrow" class="section-header__eyebrow">Access</p>
                    <div class="title-row">
                        <h3 id="settings-access-title" class="settings-card__title">Access and approval controls</h3>
                        <button type="button" id="settings-access-description-badge" class="info-badge" aria-label="More information" aria-expanded="false" aria-controls="settings-access-description">i</button>
                    </div>
                    <p id="settings-access-description" class="settings-card__description" hidden>Placeholder controls modeled after common middleware security settings.</p>
                </div>
                <form id="settings-form" class="api-form">
                    <div id="settings-access-grid" class="settings-option-grid">
                    </div>
                    <div id="settings-feedback" class="api-form-feedback" aria-live="polite"></div>
                    <div id="settings-actions" class="api-form-actions">
                        <button type="submit" id="settings-save-button" class="button button--primary primary-action-button">Save settings</button>
                        <button type="button" id="settings-reset-button" class="button button--secondary secondary-action-button">Reset defaults</button>
                    </div>
                </form>
            </section>
        </div>
    </main>

    <script type="module" src="../scripts/utils.js"></script>
    <script type="module" src="../scripts/log-store.js"></script>
    <script type="module" src="../scripts/navigation.js"></script>
    <script type="module" src="../scripts/settings/access.js"></script>
</body>
</html>
