<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malcom - Outgoing APIs</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body class="app-shell" data-section="apis" data-sidenav-item="sidenav-apis-outgoing" data-shell-path-prefix="../">
    <div id="topnav"></div>

    <aside id="sidenav"></aside>

    <main class="main" id="main-layout">
        <div class="content-shell">
            <div class="page-header section-header--page" id="apis-outgoing-header">
                <div class="title-row">
                    <h2 class="page-title section-header__title--page" id="page-title">Outgoing APIs</h2>
                    <button type="button" id="page-info-badge" class="info-badge" aria-label="Page information" aria-expanded="false" aria-controls="page-description">i</button>
                </div>
                <p class="page-description section-header__description--page" id="page-description" hidden>Review outbound deliveries.</p>
            </div>
            <section id="apis-outgoing-content" class="card api-workspace">
                <div id="apis-outgoing-copy" class="section-header api-panel-header">
                    <div id="apis-outgoing-copy-block" class="section-header__copy api-panel-header-copy">
                        <p id="apis-outgoing-eyebrow" class="section-header__eyebrow api-panel-eyebrow">Outgoing Registry</p>
                        <div id="apis-outgoing-content-title-row" class="api-panel-title-row">
                            <h3 id="apis-outgoing-content-title" class="section-header__title api-panel-title">Outbound delivery definitions</h3>
                            <button type="button" id="apis-outgoing-content-tooltip-badge" class="info-badge" aria-label="More information" aria-expanded="false" aria-controls="apis-outgoing-content-tooltip">i</button>
                        </div>
                    </div>
                    <div id="apis-outgoing-actions" class="api-form-actions">
                        <button type="button" id="apis-outgoing-create-scheduled-button" class="button button--success primary-action-button" data-create-api-type="outgoing_scheduled">Create scheduled API</button>
                        <button type="button" id="apis-outgoing-create-continuous-button" class="button button--success" data-create-api-type="outgoing_continuous">Create continuous API</button>
                        <button type="button" id="apis-outgoing-create-from-connector-button" class="button button--success" data-create-api-type="outgoing_scheduled" data-create-from-connector="true">Create from connector</button>
                    </div>
                </div>
                <p id="apis-outgoing-content-tooltip" class="section-header__description" hidden>Review scheduled and continuous deliveries in one registry.</p>
                <div id="apis-outgoing-status-bar" class="api-directory-status-bar">
                    <p id="apis-outgoing-status-copy" class="api-directory-status-copy" hidden>Active deliveries show in green and inactive deliveries show in yellow.</p>
                </div>
                <div id="apis-outgoing-list-empty" class="empty-state api-empty-state" hidden>
                    <h4 id="apis-outgoing-list-empty-title" class="api-empty-state__title">No outgoing APIs configured</h4>
                    <p id="apis-outgoing-list-empty-description" class="api-empty-state__description">Create an outgoing API.</p>
                </div>
                <div id="apis-outgoing-list" class="resource-list" aria-live="polite"></div>
            </section>
        </div>
    </main>

    <div
        id="apis-create-modal"
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="apis-create-modal-title"
        aria-hidden="true"
    >
        <div class="modal__backdrop" id="apis-create-modal-backdrop" data-modal-close="apis-create-modal"></div>
        <div class="modal__dialog modal__dialog--form" id="apis-create-modal-dialog">
            <div class="modal__content" id="apis-create-modal-content"></div>
        </div>
    </div>

    <div
        id="outgoing-api-edit-modal"
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="outgoing-api-edit-modal-title"
        aria-hidden="true"
    >
        <div class="modal__backdrop" id="outgoing-api-edit-modal-backdrop" data-modal-close="outgoing-api-edit-modal"></div>
        <div class="modal__dialog modal__dialog--form modal__dialog--wide" id="outgoing-api-edit-modal-dialog">
            <div class="modal__content" id="outgoing-api-edit-modal-content"></div>
        </div>
    </div>

    <script type="module" src="../scripts/utils.js"></script>
    <script type="module" src="../scripts/log-store.js"></script>
    <script type="module" src="../scripts/navigation.js"></script>
    <script type="module" src="../scripts/apis/outgoing.js"></script>
</body>
</html>
