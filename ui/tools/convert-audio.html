<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malcom - Convert Audio</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body class="app-shell" data-section="tools" data-sidenav-item="sidenav-tools-convert-audio" data-shell-path-prefix="../" data-tool-id="convert-audio">
    <div id="topnav"></div>

    <aside id="sidenav"></aside>

    <main class="main" id="main-layout">
        <div class="content-shell tool-config-shell" id="tools-convert-audio-shell">
            <div class="page-header section-header--page" id="tools-convert-audio-page-header">
                <div class="title-row">
                    <h2 class="page-title section-header__title--page" id="page-title">Convert Audio</h2>
                    <button type="button" id="page-info-badge" class="info-badge" aria-label="Page information" aria-expanded="false" aria-controls="page-description">i</button>
                </div>
                <p class="page-description section-header__description--page" id="page-description" hidden>Convert audio files between formats using a locally installed ffmpeg runtime.</p>
            </div>

            <section id="tools-convert-audio-workspace" class="card tool-config-workspace">
                <div id="tools-convert-audio-overview-header" class="section-header tool-config-workspace__header">
                    <div id="tools-convert-audio-overview-copy" class="section-header__copy">
                        <p id="tools-convert-audio-overview-eyebrow" class="section-header__eyebrow">Tool Setup</p>
                        <div class="title-row">
                            <h3 id="tools-convert-audio-title" class="section-header__title">Convert Audio configuration</h3>
                            <button type="button" id="tools-convert-audio-description-badge" class="info-badge" aria-label="More information" aria-expanded="false" aria-controls="tools-convert-audio-description">i</button>
                        </div>
                        <p id="tools-convert-audio-description" class="section-header__description" hidden>This tool uses ffmpeg to convert audio files between formats. Install ffmpeg on the machine running automations to enable this tool.</p>
                    </div>
                </div>

                <div id="tools-convert-audio-status-row" class="tool-config-status-row">
                    <p id="tools-convert-audio-status-label" class="tool-config-status-row__label">Status</p>
                    <p id="tools-convert-audio-status-value" class="tool-config-status-row__value">Unknown</p>
                    <p id="tools-convert-audio-status-message" class="tool-config-status-row__message"></p>
                </div>

                <form id="tools-convert-audio-form" class="tool-config-form" novalidate>
                    <div id="tools-convert-audio-enabled-row" class="form-row">
                        <label id="tools-convert-audio-enabled-label" class="form-label" for="tools-convert-audio-enabled-input">Enabled</label>
                        <input type="checkbox" id="tools-convert-audio-enabled-input" name="enabled" class="form-checkbox">
                    </div>
                    <p id="tools-convert-audio-form-feedback" class="api-form-feedback" role="status"></p>
                    <div id="tools-convert-audio-form-actions" class="form-actions">
                        <button type="submit" id="tools-convert-audio-save-button" class="button button--primary">Save</button>
                    </div>
                </form>
            </section>
        </div>
    </main>

    <script type="module" src="../scripts/tools/convert-audio.js"></script>
</body>
</html>
