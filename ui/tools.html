<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malcom - Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="topnav" class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-6">
                    <h1 class="text-xl font-semibold text-gray-900" id="project-title">Malcom</h1>
                    <nav class="flex items-center space-x-4" id="topnav-primary">
                        <a href="index.html" class="text-sm text-gray-700 hover:text-gray-900" id="nav-dashboard">Dashboard</a>
                        <a href="apis.html" class="text-sm text-gray-700 hover:text-gray-900" id="nav-apis">APIs</a>
                        <a href="tools.html" class="text-sm text-gray-700 hover:text-gray-900" id="nav-tools">Tools</a>
                    </nav>
                </div>
                <div class="flex items-center" id="dev-mode-area">
                    <label class="flex items-center space-x-2 cursor-pointer" id="developer-mode-toggle">
                        <input type="checkbox" class="sr-only" id="developer-mode-checkbox">
                        <div class="w-10 h-5 bg-gray-300 rounded-full relative transition-colors" id="developer-mode-slider">
                            <div class="w-4 h-4 bg-white rounded-full absolute top-0.5 left-0.5 transition-transform" id="developer-mode-knob"></div>
                        </div>
                        <span class="text-sm text-gray-700">Developer Mode</span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div class="ml-64 pt-16">
        <main class="p-8">
            <div class="max-w-7xl mx-auto">
                <h2 class="text-2xl font-bold text-gray-900 mb-4" id="page-title">Tools</h2>
                <p class="text-gray-600 mb-8" id="page-description">Manage local and external tools connected to the automation engine.</p>
                <div id="main-content" class="bg-white shadow rounded-lg p-6">
                    <p>Tool configuration and utilities will appear here.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const checkbox = document.getElementById('developer-mode-checkbox');
        const slider = document.getElementById('developer-mode-slider');
        const knob = document.getElementById('developer-mode-knob');

        const initialState = sessionStorage.getItem('developerMode') === 'true';
        checkbox.checked = initialState;
        if (initialState) {
            slider.classList.add('bg-blue-500');
            knob.classList.add('translate-x-5');
        }

        checkbox.addEventListener('change', () => {
            const isChecked = checkbox.checked;
            sessionStorage.setItem('developerMode', isChecked);
            if (isChecked) {
                slider.classList.add('bg-blue-500');
                knob.classList.add('translate-x-5');
            } else {
                slider.classList.remove('bg-blue-500');
                knob.classList.remove('translate-x-5');
            }
        });
    </script>
</body>
</html>
