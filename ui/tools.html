<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malcom - Tools</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body class="app-shell">
    <div id="topnav" class="topnav">
        <div class="container">
            <div class="topnav__inner">
                <div id="project-brand" class="topnav__brand project-brand">
                    <img src="./assets/malcom-icon.svg" alt="Malcom icon" id="project-icon" class="project-icon">
                    <h1 class="topnav__title" id="project-title">Malcom</h1>
                    <nav class="topnav__nav" id="topnav-primary">
                        <a href="index.html" id="nav-dashboard">Dashboard</a>
                        <a href="apis.html" id="nav-apis">APIs</a>
                        <a href="tools.html" id="nav-tools" aria-current="page">Tools</a>
                    </nav>
                </div>
                <div class="topnav__dev" id="dev-mode-area">
                    <label class="toggle" id="developer-mode-toggle">
                        <input type="checkbox" class="sr-only" id="developer-mode-checkbox">
                        <div class="toggle__slider" id="developer-mode-slider" aria-hidden="true">
                            <div class="toggle__knob" id="developer-mode-knob" aria-hidden="true"></div>
                        </div>
                        <span class="toggle__label">Developer Mode</span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <aside id="sidenav" class="sidenav">
        <nav class="sidenav__nav" id="sidebar-navigation">
            <ul class="sidenav__list">
                <li><a href="#" class="sidenav__link" id="nav-automations">Automations</a></li>
                <li><a href="#" class="sidenav__link" id="nav-runs">Runs</a></li>
                <li><a href="#" class="sidenav__link" id="nav-connectors">Connectors</a></li>
                <li><a href="#" class="sidenav__link" id="nav-settings">Settings</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main" id="main-layout">
        <div class="content-shell">
            <div class="page-header">
                <h2 class="page-title" id="page-title">Tools</h2>
                <p class="page-description" id="page-description">Manage local and external tools connected to the automation engine.</p>
            </div>
            <section id="main-content" class="card">
                <p>Tool configuration and utilities will appear here.</p>
            </section>
        </div>
    </main>

    <script>
        const toggle = document.getElementById('developer-mode-toggle');
        const checkbox = document.getElementById('developer-mode-checkbox');

        const initialState = sessionStorage.getItem('developerMode') === 'true';
        checkbox.checked = initialState;

        const updateToggleState = (isEnabled) => {
            toggle.classList.toggle('toggle--on', isEnabled);
        };

        updateToggleState(initialState);

        checkbox.addEventListener('change', () => {
            const isEnabled = checkbox.checked;
            sessionStorage.setItem('developerMode', String(isEnabled));
            updateToggleState(isEnabled);
        });
    </script>
</body>
</html>
