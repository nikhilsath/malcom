<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malcom - Local Automation Middleware</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <!-- Top Navigation -->
    <div id="topnav" class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-6">
                    <h1 class="text-xl font-semibold text-gray-900" id="project-title">Malcom</h1>
                    <nav class="flex items-center space-x-4" id="topnav-primary">
                        <a href="index.html" class="text-sm text-gray-700 hover:text-gray-900" id="nav-dashboard">Dashboard</a>
                        <a href="apis.html" class="text-sm text-gray-700 hover:text-gray-900" id="nav-apis">APIs</a>
                        <a href="tools.html" class="text-sm text-gray-700 hover:text-gray-900" id="nav-tools">Tools</a>
                    </nav>
                </div>
                <div class="flex items-center" id="dev-mode-area">
                    <label class="flex items-center space-x-2 cursor-pointer" id="developer-mode-toggle">
                        <input type="checkbox" class="sr-only" id="developer-mode-checkbox">
                        <div class="w-10 h-5 bg-gray-300 rounded-full relative transition-colors" id="developer-mode-slider">
                            <div class="w-4 h-4 bg-white rounded-full absolute top-0.5 left-0.5 transition-transform" id="developer-mode-knob"></div>
                        </div>
                        <span class="text-sm text-gray-700">Developer Mode</span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar Navigation -->
    <div id="sidenav" class="bg-white shadow-sm w-64 h-screen fixed left-0 top-16 border-r border-gray-200">
        <nav class="mt-8">
            <ul class="space-y-2 px-4">
                <li>
                    <a href="#" class="block px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-md" id="nav-automations">Automations</a>
                </li>
                <li>
                    <a href="#" class="block px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-md" id="nav-runs">Runs</a>
                </li>
                <li>
                    <a href="#" class="block px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-md" id="nav-connectors">Connectors</a>
                </li>
                <li>
                    <a href="#" class="block px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-md" id="nav-settings">Settings</a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="ml-64 pt-16">
        <main class="p-8">
            <div class="max-w-7xl mx-auto">
                <h2 class="text-2xl font-bold text-gray-900 mb-4" id="page-title">Dashboard</h2>
                <p class="text-gray-600 mb-8" id="page-description">Welcome to the Malcom automation middleware. Manage your local automations here.</p>
                <!-- Main content area for tables, lists, etc. -->
                <div id="main-content" class="bg-white shadow rounded-lg p-6">
                    <p>Content will be loaded here based on navigation.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Simple toggle for developer mode (session storage)
        const checkbox = document.getElementById('developer-mode-checkbox');
        const slider = document.getElementById('developer-mode-slider');
        const knob = document.getElementById('developer-mode-knob');

        // Load initial state
        const initialState = sessionStorage.getItem('developerMode') === 'true';
        checkbox.checked = initialState;
        if (initialState) {
            slider.classList.add('bg-blue-500');
            knob.classList.add('translate-x-5');
        }

        // Toggle handler
        checkbox.addEventListener('change', () => {
            const isChecked = checkbox.checked;
            sessionStorage.setItem('developerMode', isChecked);
            if (isChecked) {
                slider.classList.add('bg-blue-500');
                knob.classList.add('translate-x-5');
            } else {
                slider.classList.remove('bg-blue-500');
                knob.classList.remove('translate-x-5');
            }
        });
    </script>
</body>
</html>
