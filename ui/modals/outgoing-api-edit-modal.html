<div class="modal__panel" id="outgoing-api-edit-modal-panel" data-modal-id="outgoing-api-edit-modal" data-source="ui/modals/outgoing-api-edit-modal.html">
  <div class="modal__header" id="outgoing-api-edit-modal-header">
    <div class="modal__header-copy" id="outgoing-api-edit-modal-header-copy">
      <p class="modal__eyebrow" id="outgoing-api-edit-modal-eyebrow">Outgoing</p>
      <div class="api-panel-title-row" id="outgoing-api-edit-modal-title-row">
        <h3 class="modal__title" id="outgoing-api-edit-modal-title">Edit outgoing API</h3>
        <button type="button" id="outgoing-api-edit-modal-description-badge" class="info-badge" aria-label="More information" aria-expanded="false" aria-controls="outgoing-api-edit-modal-description">i</button>
      </div>
    </div>
    <button
      type="button"
      class="modal__close-icon-button"
      id="outgoing-api-edit-modal-close"
      aria-label="Close outgoing API modal"
      data-modal-close="outgoing-api-edit-modal"
    >
      ×
    </button>
  </div>
  <p id="outgoing-api-edit-modal-description" class="section-header__description modal__description" hidden>Edit destination, auth, payload, schedule, and status.</p>
  <div class="modal__body modal__body--form" id="outgoing-api-edit-modal-body">
    <form id="outgoing-api-edit-form" class="api-form">
      <input id="outgoing-api-edit-type-input" name="resourceType" type="hidden" value="outgoing_scheduled">
      <input id="outgoing-api-edit-id-input" name="resourceId" type="hidden" value="">

      <section id="outgoing-api-edit-basics-step" class="api-form-step">
        <div id="outgoing-api-edit-basics-copy" class="api-form-section-copy">
          <p id="outgoing-api-edit-basics-eyebrow" class="api-form-step__eyebrow">Basics</p>
          <p id="outgoing-api-edit-basics-title" class="api-form-step__title">Delivery record</p>
        </div>
        <div id="outgoing-api-edit-form-grid" class="api-form-grid">
          <label id="outgoing-api-edit-name-field" class="api-form-field">
            <span id="outgoing-api-edit-name-label" class="api-form-label">Name</span>
            <input id="outgoing-api-edit-name-input" class="api-form-input" name="name" type="text" maxlength="80" required>
          </label>

          <label id="outgoing-api-edit-slug-field" class="api-form-field">
            <span id="outgoing-api-edit-slug-label" class="api-form-label">Path slug</span>
            <input id="outgoing-api-edit-slug-input" class="api-form-input" name="pathSlug" type="text" maxlength="80" required>
          </label>

          <label id="outgoing-api-edit-description-field" class="api-form-field api-form-field--full">
            <span id="outgoing-api-edit-description-label" class="api-form-label">Description</span>
            <textarea id="outgoing-api-edit-description-input" class="api-form-textarea" name="description" rows="3"></textarea>
          </label>

          <label id="outgoing-api-edit-enabled-field" class="api-form-field api-form-field--toggle">
            <span id="outgoing-api-edit-enabled-label" class="api-form-label">Enabled</span>
            <span id="outgoing-api-edit-enabled-control" class="api-inline-toggle">
              <input id="outgoing-api-edit-enabled-input" name="enabled" type="checkbox">
              <span id="outgoing-api-edit-enabled-copy" class="api-inline-toggle__label">Delivery is active</span>
            </span>
          </label>
        </div>
      </section>

      <section id="outgoing-api-edit-delivery-step" class="api-form-step">
        <div id="outgoing-api-edit-delivery-copy" class="api-form-section-copy">
          <p id="outgoing-api-edit-delivery-eyebrow" class="api-form-step__eyebrow">Delivery</p>
          <p id="outgoing-api-edit-delivery-title" class="api-form-step__title">Destination and cadence</p>
        </div>

        <div id="outgoing-api-edit-delivery-grid" class="api-form-grid">
          <label id="outgoing-api-edit-destination-field" class="api-form-field api-form-field--full">
            <span id="outgoing-api-edit-destination-label" class="api-form-label">Destination URL</span>
            <input id="outgoing-api-edit-destination-input" class="api-form-input" name="destinationUrl" type="url" inputmode="url" placeholder="https://example.com/webhooks/orders">
          </label>

          <label id="outgoing-api-edit-method-field" class="api-form-field">
            <span id="outgoing-api-edit-method-label" class="api-form-label">HTTP method</span>
            <select id="outgoing-api-edit-method-input" class="api-form-input" name="httpMethod">
              <option value="POST" selected>POST</option>
              <option value="PUT">PUT</option>
              <option value="PATCH">PATCH</option>
              <option value="DELETE">DELETE</option>
              <option value="GET">GET</option>
            </select>
          </label>

          <label id="outgoing-api-edit-scheduled-time-field" class="api-form-field" hidden>
            <span id="outgoing-api-edit-scheduled-time-label" class="api-form-label">Send time</span>
            <input id="outgoing-api-edit-scheduled-time-input" class="api-form-input" name="scheduledTime" type="time" value="09:00">
          </label>

          <label id="outgoing-api-edit-scheduled-repeat-field" class="api-form-field api-form-field--toggle" hidden>
            <span id="outgoing-api-edit-scheduled-repeat-label" class="api-form-label">Repeat daily</span>
            <span id="outgoing-api-edit-scheduled-repeat-control" class="api-inline-toggle">
              <input id="outgoing-api-edit-scheduled-repeat-input" name="repeatEnabledScheduled" type="checkbox">
              <span id="outgoing-api-edit-scheduled-repeat-copy" class="api-inline-toggle__label">Keep this delivery active</span>
            </span>
          </label>

          <label id="outgoing-api-edit-continuous-repeat-field" class="api-form-field api-form-field--toggle" hidden>
            <span id="outgoing-api-edit-continuous-repeat-label" class="api-form-label">Repeat continuously</span>
            <span id="outgoing-api-edit-continuous-repeat-control" class="api-inline-toggle">
              <input id="outgoing-api-edit-continuous-repeat-input" name="repeatEnabledContinuous" type="checkbox">
              <span id="outgoing-api-edit-continuous-repeat-copy" class="api-inline-toggle__label">Keep this delivery active</span>
            </span>
          </label>

          <label id="outgoing-api-edit-continuous-interval-value-field" class="api-form-field" hidden>
            <span id="outgoing-api-edit-continuous-interval-value-label" class="api-form-label">Repeat every</span>
            <input id="outgoing-api-edit-continuous-interval-value-input" class="api-form-input" name="repeatIntervalValue" type="number" min="1" max="168" step="1" value="5">
          </label>

          <label id="outgoing-api-edit-continuous-interval-unit-field" class="api-form-field" hidden>
            <span id="outgoing-api-edit-continuous-interval-unit-label" class="api-form-label">Interval unit</span>
            <select id="outgoing-api-edit-continuous-interval-unit-input" class="api-form-input" name="repeatIntervalUnit">
              <option value="minutes" selected>Minutes</option>
              <option value="hours">Hours</option>
            </select>
          </label>

          <label id="outgoing-api-edit-auth-type-field" class="api-form-field">
            <span id="outgoing-api-edit-auth-type-label" class="api-form-label">Destination auth</span>
            <select id="outgoing-api-edit-auth-type-input" class="api-form-input" name="outgoingAuthType">
              <option value="none" selected>None</option>
              <option value="bearer">Bearer token</option>
              <option value="basic">Basic auth</option>
              <option value="header">Custom header</option>
            </select>
          </label>

          <label id="outgoing-api-edit-auth-token-field" class="api-form-field api-form-field--full" hidden>
            <span id="outgoing-api-edit-auth-token-label" class="api-form-label">Bearer token</span>
            <input id="outgoing-api-edit-auth-token-input" class="api-form-input" name="authToken" type="password" autocomplete="off">
          </label>

          <label id="outgoing-api-edit-auth-username-field" class="api-form-field" hidden>
            <span id="outgoing-api-edit-auth-username-label" class="api-form-label">Username</span>
            <input id="outgoing-api-edit-auth-username-input" class="api-form-input" name="authUsername" type="text" autocomplete="off">
          </label>

          <label id="outgoing-api-edit-auth-password-field" class="api-form-field" hidden>
            <span id="outgoing-api-edit-auth-password-label" class="api-form-label">Password</span>
            <input id="outgoing-api-edit-auth-password-input" class="api-form-input" name="authPassword" type="password" autocomplete="off">
          </label>

          <label id="outgoing-api-edit-auth-header-name-field" class="api-form-field" hidden>
            <span id="outgoing-api-edit-auth-header-name-label" class="api-form-label">Header name</span>
            <input id="outgoing-api-edit-auth-header-name-input" class="api-form-input" name="authHeaderName" type="text" autocomplete="off" placeholder="X-API-Key">
          </label>

          <label id="outgoing-api-edit-auth-header-value-field" class="api-form-field" hidden>
            <span id="outgoing-api-edit-auth-header-value-label" class="api-form-label">Header value</span>
            <input id="outgoing-api-edit-auth-header-value-input" class="api-form-input" name="authHeaderValue" type="password" autocomplete="off">
          </label>

          <label id="outgoing-api-edit-payload-field" class="api-form-field api-form-field--full">
            <span id="outgoing-api-edit-payload-label" class="api-form-label">Payload template</span>
            <textarea id="outgoing-api-edit-payload-input" class="api-form-textarea" name="payloadTemplate" rows="8" spellcheck="false">{ "event": "scheduled.delivery", "sent_at": "{{timestamp}}" }</textarea>
          </label>

          <div id="outgoing-api-edit-test-actions-field" class="api-form-field api-form-field--full">
            <div id="outgoing-api-edit-test-actions" class="api-form-actions">
              <button type="button" id="outgoing-api-edit-test-button" class="button button--secondary secondary-action-button">Send test payload</button>
            </div>
            <div id="outgoing-api-edit-test-feedback" class="api-form-feedback" aria-live="polite"></div>
          </div>
        </div>
      </section>

      <div id="outgoing-api-edit-form-feedback" class="api-form-feedback" aria-live="polite"></div>

      <div id="outgoing-api-edit-form-actions" class="api-form-actions">
        <button type="submit" id="outgoing-api-edit-submit-button" class="primary-action-button">Save changes</button>
      </div>
    </form>
  </div>
</div>
