<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malcom</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body class="app-shell" data-section="tools" data-sidenav-item="sidenav-tools-catalog" data-shell-path-prefix="../">
    <div id="topnav"></div>

    <aside id="sidenav"></aside>

    <main class="main" id="main-layout">
        <div class="content-shell">
            <div class="page-header section-header--page">
                <div class="title-row">
                    <h2 class="page-title section-header__title--page" id="page-title"></h2>
                    <button type="button" id="page-info-badge" class="info-badge" aria-label="Page information" aria-expanded="false" aria-controls="page-description">i</button>
                </div>
                <p class="page-description section-header__description--page" id="page-description" hidden></p>
            </div>
            <section id="main-content" class="card tools-directory-workspace">
                <div id="tools-selection-header" class="section-header tools-selection-header">
                    <div id="tools-selection-copy" class="section-header__copy tools-selection-copy">
                        <p id="tools-selection-eyebrow" class="section-header__eyebrow tools-selection-eyebrow">Tool Directory</p>
                        <div class="title-row">
                            <h3 id="tools-selection-title" class="section-header__title tools-selection-title">Select a tool</h3>
                            <button type="button" id="tools-selection-description-badge" class="info-badge" aria-label="More information" aria-expanded="false" aria-controls="tools-selection-description">i</button>
                        </div>
                        <p id="tools-selection-description" class="section-header__description tools-selection-description" hidden>Edit tool metadata and availability.</p>
                    </div>
                    <div id="tools-selection-status" class="section-status stat-card tools-selection-status" aria-live="polite">
                        <span id="selected-tools-count" class="selected-tools-count">0 loaded</span>
                        <span id="selected-tools-helper" class="selected-tools-helper" hidden>Select a tool to edit or open configuration.</span>
                    </div>
                </div>

                <div id="tools-directory-layout" class="tools-directory-layout">
                    <div id="tools-grid" class="tools-grid" role="list" aria-label="Available tools"></div>
                </div>
            </section>
        </div>
    </main>

    <div id="tool-detail-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="tool-detail-title" aria-describedby="tool-detail-description">
        <button type="button" id="tool-detail-modal-backdrop" class="modal__backdrop" data-modal-close="tool-detail-modal" aria-label="Close tool details"></button>
        <div class="modal__dialog modal__dialog--form tool-detail-modal-dialog">
            <div class="modal__content">
                <section id="tool-detail-panel" class="modal__panel tool-detail-panel" aria-live="polite">
                    <div id="tool-detail-header" class="section-header modal__header tool-detail-panel__header">
                        <div id="tool-detail-copy" class="section-header__copy modal__header-copy">
                            <p id="tool-detail-eyebrow" class="section-header__eyebrow modal__eyebrow">Selected tool</p>
                            <div class="title-row">
                                <h3 id="tool-detail-title" class="section-header__title modal__title">Choose a tool</h3>
                                <button type="button" id="tool-detail-description-badge" class="info-badge" aria-label="More information" aria-expanded="false" aria-controls="tool-detail-description">i</button>
                            </div>
                            <p id="tool-detail-description" class="section-header__description modal__description" hidden>Manage tool metadata and enablement.</p>
                        </div>
                        <button type="button" id="tool-detail-modal-close" class="modal__close-icon-button" data-modal-close="tool-detail-modal" aria-label="Close tool details">×</button>
                    </div>

                    <form id="tool-detail-form" class="api-form modal__body modal__body--form tool-detail-modal-body">
                        <div id="tool-detail-form-grid" class="api-form-grid">
                            <label id="tool-detail-id-field" class="api-form-field">
                                <span id="tool-detail-id-label" class="api-form-label">Tool ID</span>
                                <input id="tool-detail-id-input" class="api-form-input" name="toolId" type="text" readonly>
                            </label>

                            <label id="tool-detail-enabled-field" class="api-form-field api-form-field--toggle tool-detail-switch-field">
                                <span id="tool-detail-enabled-copy-group" class="tool-detail-switch-field__copy">
                                    <span id="tool-detail-enabled-label" class="api-form-label">Availability</span>
                                    <span id="tool-detail-enabled-copy" class="tool-detail-switch-field__description">Tool is enabled</span>
                                </span>
                                <span id="tool-detail-enabled-control" class="tool-detail-switch">
                                    <input id="tool-detail-enabled-input" class="tool-detail-switch__input" name="enabled" type="checkbox">
                                    <span id="tool-detail-enabled-track" class="tool-detail-switch__track" aria-hidden="true">
                                        <span id="tool-detail-enabled-thumb" class="tool-detail-switch__thumb"></span>
                                    </span>
                                </span>
                            </label>

                            <label id="tool-detail-name-field" class="api-form-field api-form-field--full">
                                <span id="tool-detail-name-label" class="api-form-label">Tool name</span>
                                <input id="tool-detail-name-input" class="api-form-input" name="name" type="text" maxlength="120" required>
                            </label>

                            <label id="tool-detail-description-field" class="api-form-field api-form-field--full">
                                <span id="tool-detail-description-label" class="api-form-label">Description</span>
                                <textarea id="tool-detail-description-input" class="api-form-textarea" name="description" rows="4" maxlength="500" required></textarea>
                            </label>
                        </div>

                        <div id="tool-detail-form-feedback" class="api-form-feedback" aria-live="polite"></div>

                        <div id="tool-detail-form-actions" class="api-form-actions">
                            <a id="tool-detail-config-link" class="button button--secondary secondary-action-button" href="../tools/catalog.html" aria-disabled="true">Open configuration</a>
                        </div>
                    </form>
                </section>
            </div>
        </div>
    </div>

    <script type="module" src="../scripts/utils.js"></script>
    <script type="module" src="../scripts/log-store.js"></script>
    <script type="module" src="../scripts/navigation.js"></script>
    <script type="module" src="../scripts/tools/catalog.js"></script>
</body>
</html>
